<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler MMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #loginScreen {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 10px;
            border: 2px solid #0f3460;
        }
        
        #loginScreen h1 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #loginScreen input {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            margin: 10px;
            background: #0f3460;
            color: #fff;
            width: 250px;
        }
        
        #loginScreen button {
            padding: 12px 40px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        #loginScreen button:hover {
            transform: scale(1.05);
        }
        
        #gameScreen {
            display: none;
            width: 100%;
            height: 100vh;
        }
        
        #gameCanvas {
            border: 3px solid #0f3460;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }
        
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            min-width: 200px;
        }
        
        #ui h3 { color: #e94560; margin-bottom: 10px; }
        #ui div { margin: 5px 0; }
        
        .hp-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.3s;
        }
        
        #weaponInfo {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            min-width: 200px;
        }
        
        #weaponInfo h3 { color: #4ecca3; margin-bottom: 10px; }
        .weapon-name { color: #fff; font-weight: bold; }
        .weapon-stat { color: #aaa; margin: 3px 0; }
        
        #controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #aaa;
        }

        #levelComplete {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #e94560;
            text-align: center;
            z-index: 1000;
        }

        #levelComplete h2 { color: #4ecca3; margin-bottom: 20px; }

        #lootDisplay {
            margin: 20px 0;
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
        }

        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #00ff00; }
        .rarity-rare { color: #0088ff; }
        .rarity-epic { color: #aa00ff; }
        .rarity-legendary { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <h1>⚔️ Dungeon Crawler MMO</h1>
        <p>Enter the depths...</p>
        <input type="text" id="playerName" placeholder="Dein Name" maxlength="20" value="Adventurer">
        <br>
        <button onclick="startGame()">Spielen</button>
    </div>

    <div id="gameScreen">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <h3>⚡ Stats</h3>
            <div id="playerNameDisplay">Name: -</div>
            <div id="playerLevel">Level: 1</div>
            <div id="playerXp">XP: 0/100</div>
            <div>HP:</div>
            <div class="hp-bar">
                <div class="hp-fill" id="hpBar" style="width: 100%"></div>
            </div>
            <div id="hpText">100/100</div>
            <div id="dungeonLevel">Dungeon: 1</div>
        </div>

        <div id="weaponInfo">
            <h3>🗡️ Weapon</h3>
            <div id="weaponName" class="weapon-name">-</div>
            <div class="weapon-stat" id="weaponDamage">Damage: -</div>
            <div class="weapon-stat" id="weaponRange">Range: -</div>
            <div class="weapon-stat" id="weaponSpeed">Speed: -</div>
        </div>

        <div id="controls">
            <div><strong>WASD</strong> - Bewegen</div>
            <div><strong>LEERTASTE</strong> - Angreifen</div>
            <div><strong>E</strong> - Item aufheben</div>
            <div><strong>🔴</strong> = Start, <strong>🟢</strong> = Exit</div>
        </div>

        <div id="levelComplete">
            <h2>Level Complete! 🎉</h2>
            <p>Alle Monster besiegt!</p>
            <div id="lootDisplay"></div>
            <button onclick="continueToNextLevel()">Nächstes Level</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
